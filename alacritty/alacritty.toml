[general]
live_config_reload = true

[window]
decorations = "None"
opacity = 0.8
dynamic_padding = false

[window.padding]
x = 0
y = 0

[scrolling]
history = 100000
multiplier = 10

[font]
size = 16.0

[font.normal]
family = "MesloLGS NF"
style = "Regular"

[font.bold]
family = "MesloLGS NF"
style = "Bold"

[font.italic]
family = "MesloLGS NF"
style = "Italic"

[font.bold_italic]
family = "MesloLGS NF"
style = "Bold Italic"

[font.offset]
x = 0
y = 0

[cursor]
unfocused_hollow = true
blink_interval = 500
blink_timeout = 5
style = { shape = "Block", blinking = "On" }

[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#2D2A2E"
foreground = "#FCFCFA"

[colors.normal]
black = "#403E41"
red = "#FF6188"
green = "#A9DC76"
yellow = "#FFD866"
blue = "#FC9867"
magenta = "#AB9DF2"
cyan = "#78DCE8"
white = "#FCFCFA"

[colors.bright]
black = "#727072"
red = "#FF6188"
green = "#A9DC76"
yellow = "#FFD866"
blue = "#FC9867"
magenta = "#AB9DF2"
cyan = "#78DCE8"
white = "#FCFCFA"

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

[terminal.shell]
program = "pwsh"
args = ["--NoLogo"]

[mouse]
hide_when_typing = false

[[keyboard.bindings]]
action = "ToggleMaximized"
key = "F"
mods = "Control"